apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-1
  namespace: test-ns
  labels:
    app: nginx
spec:
  replicas: 5
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
          - containerPort: 80
